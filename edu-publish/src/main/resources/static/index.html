<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户变动统计看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .controls label {
            font-weight: bold;
            color: #333;
        }
        
        .controls input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            width: 200px;
        }
        
        .controls button {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-card .icon {
            font-size: 48px;
            float: right;
            opacity: 0.2;
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }
        
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        #pieChart, #barChart {
            width: 100%;
            height: 400px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 50px;
        }
        
        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 用户变动统计看板</h1>
        <div class="subtitle">Flink 实时数据可视化</div>
    </div>

    <div class="controls">
        <label for="dateInput">选择日期：</label>
        <input type="date" id="dateInput">
        <button onclick="loadData()">查询</button>
        <button onclick="loadTodayData()">今天</button>
        <span style="color: #666; margin-left: auto;">数据来源: ClickHouse</span>
    </div>

    <div id="errorMsg"></div>

    <div id="loading" class="loading" style="display: none;">加载中...</div>

    <div id="content" style="display: none;">
        <div class="stats-cards">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="label">活跃用户数</div>
                <div class="value" id="activeUserCt">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">✨</div>
                <div class="label">新增用户数</div>
                <div class="value" id="newUserCt">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔄</div>
                <div class="label">回流用户数</div>
                <div class="value" id="backCount">-</div>
            </div>
            <div class="stat-card">
                <div class="icon">📈</div>
                <div class="label">总用户变动</div>
                <div class="value" id="totalCount">-</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">用户分布饼图</div>
                <div id="pieChart"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">用户数量柱状图</div>
                <div id="barChart"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let pieChart, barChart;

    // 初始化图表
    function initCharts() {
        pieChart = echarts.init(document.getElementById('pieChart'));
        barChart = echarts.init(document.getElementById('barChart'));

        // 响应式调整
        window.addEventListener('resize', function() {
            pieChart.resize();
            barChart.resize();
        });
    }

    // 格式化日期为 YYYYMMDD
    function formatDate(dateStr) {
        if (!dateStr) return null;
        return dateStr.replace(/-/g, '');
    }

    // 获取今天的日期字符串
    function getTodayString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // 加载今天的数据
    function loadTodayData() {
        document.getElementById('dateInput').value = getTodayString();
        loadData();
    }

    // 加载数据
    async function loadData() {
        const dateInput = document.getElementById('dateInput').value;
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        const content = document.getElementById('content');

        errorMsg.innerHTML = '';
        loading.style.display = 'block';
        content.style.display = 'none';

        try {
            let url = '/edu/realtime/user/userChangeCt?';
            if (dateInput) {
                url += 'date=' + formatDate(dateInput);
            } else {
                url += 'date=1'; // 使用默认值（今天）
            }

            const response = await fetch(url);
            if (!response.ok) {
                throw new Error('请求失败: ' + response.status);
            }

            const data = await response.json();

            if (data.status !== 0) {
                throw new Error(data.msg || '数据异常');
            }

            renderData(data.data);
            loading.style.display = 'none';
            content.style.display = 'block';

        } catch (error) {
            console.error('加载数据失败:', error);
            errorMsg.innerHTML = '<div class="error">❌ 加载数据失败: ' + error.message + '</div>';
            loading.style.display = 'none';
        }
    }

    // 渲染数据
    function renderData(data) {
        if (!data || !data.rows || data.rows.length === 0) {
            document.getElementById('errorMsg').innerHTML =
                '<div class="error">⚠️ 暂无数据</div>';
            return;
        }

        const rows = data.rows;

        // 提取数据
        let activeUserCt = 0, newUserCt = 0, backCount = 0;
        const chartData = [];

        rows.forEach(item => {
            const type = item.type;
            const userCt = parseInt(item.user_ct) || 0;

            if (type === 'activeUserCt') {
                activeUserCt = userCt;
            } else if (type === 'newUserCt') {
                newUserCt = userCt;
            } else if (type === 'back_count') {
                backCount = userCt;
            }

            chartData.push({
                name: getTypeName(type),
                value: userCt
            });
        });

        const totalCount = activeUserCt + newUserCt + backCount;

        // 更新统计卡片
        document.getElementById('activeUserCt').textContent = activeUserCt.toLocaleString();
        document.getElementById('newUserCt').textContent = newUserCt.toLocaleString();
        document.getElementById('backCount').textContent = backCount.toLocaleString();
        document.getElementById('totalCount').textContent = totalCount.toLocaleString();

        // 颜色配置
        const colors = ['#667eea', '#764ba2', '#f093fb'];

        // 渲染饼图
        const pieOption = {
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left',
                top: 'middle'
            },
            color: colors,
            series: [
                {
                    name: '用户类型',
                    type: 'pie',
                    radius: '60%',
                    data: chartData,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    },
                    label: {
                        fontSize: 14,
                        formatter: '{b}\n{c}'
                    }
                }
            ]
        };
        pieChart.setOption(pieOption);

        // 渲染柱状图
        const barOption = {
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'shadow'
                }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: chartData.map(item => item.name),
                axisLabel: {
                    fontSize: 12,
                    rotate: 30
                }
            },
            yAxis: {
                type: 'value',
                name: '用户数'
            },
            series: [
                {
                    name: '用户数',
                    type: 'bar',
                    data: chartData.map((item, index) => ({
                        value: item.value,
                        itemStyle: {
                            color: colors[index % colors.length]
                        }
                    })),
                    label: {
                        show: true,
                        position: 'top',
                        fontSize: 14
                    },
                    barWidth: '50%'
                }
            ]
        };
        barChart.setOption(barOption);
    }

    // 类型名称映射
    function getTypeName(type) {
        const typeMap = {
            'activeUserCt': '活跃用户',
            'newUserCt': '新增用户',
            'back_count': '回流用户'
        };
        return typeMap[type] || type;
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', function() {
        initCharts();
        loadTodayData(); // 自动加载今天的数据
    });
</script>
</body>
</html>
